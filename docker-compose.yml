version: "3.8"
services:
  pupatao-client:
    container_name: pupatao-client
    build:
      context: .
      # Public client vars — baked into the browser bundle at build time so
      # Pusher realtime works. Values come from .env in this directory.
      args:
        VITE_PUSHER_KEY: ${VITE_PUSHER_KEY}
        VITE_PUSHER_CLUSTER: ${VITE_PUSHER_CLUSTER}
        VITE_MESSENGER_GROUP_URL: ${VITE_MESSENGER_GROUP_URL}
        VITE_WHATSAPP_GROUP_URL: ${VITE_WHATSAPP_GROUP_URL}
    restart: always
    networks:
      - pupatao-share-network
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "5176:3000"
    volumes:
      # Only mount for dev — in prod you don’t want to overwrite built files
      - ./public:/app/public
networks:
  pupatao-share-network:
    external: true
