services:
  pupatao-client:
    build:
      context: .
      # Public client vars — baked into the browser bundle at build time so
      # Pusher realtime works. Values come from .env in this directory.
      args:
        VITE_PUSHER_KEY: ${VITE_PUSHER_KEY}
        VITE_PUSHER_CLUSTER: ${VITE_PUSHER_CLUSTER}
        VITE_MESSENGER_GROUP_URL: ${VITE_MESSENGER_GROUP_URL}
        VITE_WHATSAPP_GROUP_URL: ${VITE_WHATSAPP_GROUP_URL}
    restart: always
    # 2 replicas — one per vCPU (Node is single-threaded, so this actually uses
    # both cores). nginx load-balances across them. NOTE: no container_name here
    # — each replica must get its own auto-generated name.
    deploy:
      replicas: 2
    networks:
      - pupatao-share-network
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    # Each replica is published to a host port from this range (5176, 5177);
    # the host nginx `upstream` block below load-balances across both.
    ports:
      - "5176-5177:3000"
networks:
  pupatao-share-network:
    external: true
